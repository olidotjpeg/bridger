info:
  name: Get Single Full Image
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:8080/api/images/:id/full
  params:
    - name: id
      value: "77"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  - name: returns 200
    assert: res.status == 200
  - name: content-type is an image
    assert: res.headers["content-type"].includes("image/")
