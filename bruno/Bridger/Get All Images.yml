info:
  name: Get All Images
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:8080/api/images
  params:
    - name: page
      value: "1"
      type: query
      enabled: true
    - name: limit
      value: "50"
      type: query
      enabled: true
    - name: sort
      value: capture_date
      type: query
      enabled: true
    - name: order
      value: desc
      type: query
      enabled: true
    - name: rating
      value: "1"
      type: query
      enabled: false
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
