info:
  name: Get Image Tags
  type: http
  seq: 8

http:
  method: GET
  url: http://localhost:8080/api/images/:id/tags
  params:
    - name: id
      value: "1"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  - name: returns 200
    assert: res.status == 200
  - name: response is an array
    assert: res.body != null
