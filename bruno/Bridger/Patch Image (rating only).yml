info:
  name: Patch Image (rating only)
  type: http
  seq: 10

http:
  method: PATCH
  url: http://localhost:8080/api/images/:id
  params:
    - name: id
      value: "1"
      type: path
  body:
    mode: json
    json: |
      {
        "rating": 5
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  - name: returns 200
    assert: res.status == 200
  - name: rating is updated to 5
    assert: res.body.rating == 5
  - name: response has an id
    assert: res.body.id != null
