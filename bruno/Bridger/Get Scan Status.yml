info:
  name: Get Scan Status
  type: http
  seq: 4

http:
  method: GET
  url: http://localhost:8080/api/scan/status
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  - name: returns 200
    assert: res.status == 200
  - name: running field is present
    assert: res.body.running != null
  - name: processed is a number
    assert: res.body.processed >= 0
  - name: total is a number
    assert: res.body.total >= 0
  - name: errors is a number
    assert: res.body.errors >= 0
