info:
  name: Post Tag
  type: http
  seq: 5

http:
  method: POST
  url: http://localhost:8080/api/tags
  body:
    mode: json
    json: |
      {
        "name": "Wedding"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  - name: returns 201 Created
    assert: res.status == 201
  - name: tag has an id
    assert: res.body.id > 0
  - name: tag name matches request
    assert: res.body.name == "Wedding"
