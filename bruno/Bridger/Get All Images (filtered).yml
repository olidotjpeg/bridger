info:
  name: Get All Images (filtered)
  type: http
  seq: 9

http:
  method: GET
  url: http://localhost:8080/api/images
  params:
    - name: page
      value: "1"
      type: query
      enabled: true
    - name: limit
      value: "50"
      type: query
      enabled: true
    - name: sort
      value: rating
      type: query
      enabled: true
    - name: order
      value: desc
      type: query
      enabled: true
    - name: rating
      value: "1"
      type: query
      enabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  - name: returns 200
    assert: res.status == 200
  - name: data is an array
    assert: res.body.data != null
  - name: all results meet minimum rating
    assert: res.body.total >= 0
  - name: page is 1
    assert: res.body.page == 1
