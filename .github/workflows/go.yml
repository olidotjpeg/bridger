# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
    - run: CGO_ENABLED=0 go test -tags dev ./internal/...

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            output: bridger-linux-amd64
          - os: windows
            arch: amd64
            output: bridger-windows-amd64.exe
          - os: darwin
            arch: amd64
            output: bridger-darwin-amd64
          - os: darwin
            arch: arm64
            output: bridger-darwin-arm64
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '25'
    - name: Build frontend
      run: |
        cd web
        npm ci
        npm run build
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
    - run: CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o dist/${{ matrix.output }} ./cmd
