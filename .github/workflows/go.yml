name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
    - run: CGO_ENABLED=0 go test -tags dev ./internal/...

  build:
    needs: test
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            output: bridger-linux-amd64
          - runner: windows-latest
            platform: windows/amd64
            output: bridger-windows-amd64.exe
          - runner: macos-latest
            platform: darwin/amd64
            output: bridger-darwin-amd64
          - runner: macos-latest
            platform: darwin/arm64
            output: bridger-darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
    - name: Install Wails
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
    - name: Install Linux dependencies
      if: matrix.runner == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
    - name: Build
      run: wails build -platform ${{ matrix.platform }} -o dist/${{ matrix.output }}
