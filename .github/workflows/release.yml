name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            platform: darwin/arm64
            artifact: Bridger-macOS-arm64.zip
          - os: windows-latest
            platform: windows/amd64
            artifact: Bridger-Windows-amd64.exe
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: Bridger-Linux-amd64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: wails build -platform ${{ matrix.platform }} -tags webkit2_41 -ldflags "-X main.version=${{ github.ref_name }}"

      - name: Build
        if: matrix.os != 'ubuntu-latest'
        run: wails build -platform ${{ matrix.platform }} -ldflags "-X main.version=${{ github.ref_name }}"

      - name: Package (macOS)
        if: startsWith(matrix.os, 'macos')
        run: cd build/bin && zip -r ../../${{ matrix.artifact }} Bridger.app

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: tar -czf ${{ matrix.artifact }} -C build/bin Bridger

      - name: Copy artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: cp build/bin/Bridger.exe ${{ matrix.artifact }}
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  scan:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      analysis: ${{ steps.vt.outputs.analysis }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: VirusTotal scan
        id: vt
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: dist/*

  release:
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Format VirusTotal results
        id: vt_body
        run: |
          body="## VirusTotal scan results"$'\n'
          while IFS= read -r line; do
            file=$(echo "$line" | cut -d'=' -f1)
            url=$(echo "$line" | cut -d'=' -f2)
            body+="- [$file]($url)"$'\n'
          done <<< "${{ needs.scan.outputs.analysis }}"
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: ${{ steps.vt_body.outputs.body }}
